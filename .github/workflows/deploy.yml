name: Deploy (Hetzner) [LEGADO - DESATIVADO]

# ============================================================================
# LEGADO / DESATIVADO (hardening pré-features, 2026-06-30)
# A produção oficial do Portal Nexus é a VERCEL (build zero-config do Next.js).
# Este workflow representa a stack self-hosted Hetzner (Docker + Caddy) ANTIGA.
# O gatilho automático em `push` foi REMOVIDO para evitar deploy-fantasma e
# falhas em vermelho a cada push. Mantido apenas como `workflow_dispatch`
# (execução manual deliberada) e NÃO removido — os arquivos Dockerfile/
# docker-compose.yml/Caddyfile seguem no repo, pendentes de decisão dedicada.
# Para reativar o auto-deploy Hetzner: readicionar o bloco `push:` abaixo.
# ============================================================================
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /opt/codex-community
            git pull --ff-only
            docker compose build
            docker compose up -d
            docker image prune -f
